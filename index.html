<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canastas Numéricas - Relaciona Número y Cantidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #e0f2fe; /* Light sky blue */
            --grass: #4ade80; /* Bright green grass */
            --grass-dark: #22c55e;
            --primary: #f59e0b; /* Amber */
            --basket-brown: #d97706;
            --basket-dark: #b45309;
            --apple-red: #ef4444;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(to bottom, var(--bg-sky) 0%, var(--bg-sky) 70%, #bbf7d0 70%, #86efac 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Clouds decoration */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
            animation: float 20s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 100px;
        }
        .cloud-1 {
            width: 120px; height: 40px; top: 10%; left: -150px;
            animation-duration: 25s;
        }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; right: 15px; }

        .cloud-2 {
            width: 160px; height: 50px; top: 20%; left: -200px;
            animation-duration: 35s;
            animation-delay: 5s;
        }
        .cloud-2::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .cloud-2::after { width: 90px; height: 90px; top: -45px; right: 25px; }

        @keyframes float {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 300px)); }
        }

        header {
            width: 100%;
            padding: 15px 20px;
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1e3a8a;
            text-shadow: 2px 2px 0px white;
            font-weight: 900;
        }

        .btn-audio {
            background: #3b82f6;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8, 0 6px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-audio:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1d4ed8, 0 2px 5px rgba(0,0,0,0.15);
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px 20px 20px 20px;
            z-index: 5;
            position: relative;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            flex: 1;
        }
        .screen.active {
            display: flex;
        }

        /* Menu Screen */
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-icon {
            font-size: 5rem;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }
        .game-title {
            font-size: 3rem;
            color: #1e3a8a;
            text-shadow: 3px 3px 0px white;
            font-weight: 900;
            margin-top: 10px;
        }
        .game-subtitle {
            font-size: 1.2rem;
            color: #475569;
            font-weight: 700;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: center;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-green { background-color: #22c55e; box-shadow: 0 6px 0 #16a34a, 0 8px 15px rgba(0,0,0,0.15); }
        .btn-yellow { background-color: #eab308; box-shadow: 0 6px 0 #ca8a04, 0 8px 15px rgba(0,0,0,0.15); }
        .btn-orange { background-color: #f97316; box-shadow: 0 6px 0 #ea580c, 0 8px 15px rgba(0,0,0,0.15); }

        /* Game Screen */
        .game-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .btn-home {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #b91c1c;
        }
        .btn-home:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b91c1c;
        }

        /* Play Area */
        .play-area {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
            gap: 20px;
        }

        /* Baskets Container */
        .baskets-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            flex: 1;
            padding-bottom: 20px;
            gap: 15px;
        }

        .basket-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 160px;
        }

        .basket {
            width: 150px;
            height: 110px;
            background: linear-gradient(135deg, var(--basket-brown), var(--basket-dark));
            border-radius: 0 0 50% 50% / 0 0 25% 25%;
            position: relative;
            border: 6px solid #78350f;
            border-top: 15px solid #78350f;
            box-shadow: 0 8px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .basket::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 10px;
            right: 10px;
            height: 30px;
            border: 6px solid #78350f;
            border-bottom: none;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            z-index: -1;
        }

        .basket.drag-over {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
        }

        .basket.success {
            border-color: #22c55e;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.6);
            animation: bounce-small 0.5s ease;
        }

        .basket.error {
            border-color: #ef4444;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.6);
            animation: shake 0.3s ease;
        }

        .basket-target {
            background-color: #fef08a;
            color: #854d0e;
            border: 4px solid #ca8a04;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 3;
        }

        .basket.success .basket-target {
            background-color: #22c55e;
            color: white;
            border-color: #15803d;
        }

        .basket.error .basket-target {
            background-color: #ef4444;
            color: white;
            border-color: #b91c1c;
        }

        /* Apples inside the basket visual count list */
        .apples-in-basket {
            position: absolute;
            bottom: 10px;
            left: 5px;
            right: 5px;
            top: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2px;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        .basket-apple {
            width: 24px;
            height: 24px;
            font-size: 1.1rem;
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto; /* allow dragging it out */
        }

        /* Apples Source Area */
        .apples-source {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            min-height: 120px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Apple Element */
        .apple {
            width: 50px;
            height: 50px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            position: relative;
            z-index: 10;
            transition: transform 0.2s;
            touch-action: none;
        }
        .apple:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* Victory Screen */
        .victory-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .victory-icon {
            font-size: 5rem;
            animation: pulse 1.5s infinite;
        }
        .victory-title {
            font-size: 2.5rem;
            color: #15803d;
            font-weight: 900;
            margin: 15px 0;
        }
        .victory-text {
            font-size: 1.2rem;
            color: #475569;
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* Confetti Canvas */
        #confetti {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes bounce-small {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- Decorative clouds -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <header>
        <h1 id="header-title">🍎 Canastas Numéricas</h1>
        <button class="btn-audio" onclick="speakInstruction()" title="Escuchar instrucción" aria-label="Escuchar instrucción">🔊</button>
    </header>

    <div class="container">
        
        <!-- MENU SCREEN -->
        <div id="screen-menu" class="screen active">
            <div class="logo-container">
                <span class="logo-icon">🧺🍎</span>
                <h2 class="game-title">Canastas Numéricas</h2>
                <p class="game-subtitle">¡Coloca las manzanas correctas!</p>
            </div>
            <div class="menu-buttons">
                <button class="btn btn-green" onclick="startGame('facil')">Fácil (1 - 3)</button>
                <button class="btn btn-yellow" onclick="startGame('medio')">Medio (1 - 5)</button>
                <button class="btn btn-orange" onclick="startGame('dificil')">Difícil (1 - 10)</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="screen">
            <div class="game-stats">
                <button class="btn-home" onclick="showScreen('menu')">◀ Menú</button>
                <span id="level-indicator">Nivel: Fácil</span>
            </div>

            <div class="play-area">
                <!-- Baskets area -->
                <div class="baskets-container" id="baskets-container">
                    <!-- Baskets generated dynamically -->
                </div>

                <!-- Source of apples -->
                <div class="apples-source" id="apples-source" ondragover="event.preventDefault()" ondrop="dropToSource(event)">
                    <!-- Apples generated dynamically -->
                </div>

                <!-- Verify button -->
                <div style="text-align: center; margin-top: 10px;">
                    <button class="btn btn-green" id="btn-verify" onclick="verifyLevel()" style="padding: 12px 40px; font-size: 1.4rem;">¡Verificar canastas! 🔍</button>
                </div>
            </div>
        </div>

        <!-- VICTORY SCREEN -->
        <div id="screen-victory" class="screen">
            <div class="victory-card">
                <span class="victory-icon">🏆🎉</span>
                <h2 class="victory-title">¡Excelente Trabajo!</h2>
                <p class="victory-text">¡Has contado y colocado todas las manzanas correctamente!</p>
                <button class="btn btn-green" onclick="showScreen('menu')">Jugar de Nuevo</button>
            </div>
        </div>

    </div>

    <canvas id="confetti"></canvas>

    <script>
        // Web Audio Synthesizer for Kids Game
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') {
                // Drag pop sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'success') {
                // A correct basket or matching drop
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'victory') {
                // Victory music
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.15); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.3); // G5
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.45); // C6
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.85);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.9);
            } else if (type === 'wrong') {
                // Wrong drop / overflow
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Game Configuration
        let currentDifficulty = 'facil';
        let basketsData = [];
        let totalApplesPlaced = 0;
        let instructionText = "¡Arrastra las manzanas a las canastas según el número indicado!";

        // Sound Instructions (TTS)
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX';
                window.speechSynthesis.speak(utterance);
            }
        }

        function speakInstruction() {
            speak(instructionText);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');

            if (screenId === 'menu') {
                instructionText = "Elige un nivel para jugar: Fácil, Medio, o Difícil";
                speakInstruction();
            } else if (screenId === 'victory') {
                instructionText = "¡Felicidades! Lograste acomodar todas las manzanas.";
                speakInstruction();
                startConfetti();
            }
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            showScreen('game');

            const levelInd = document.getElementById('level-indicator');
            let basketCount = 2;
            let maxNumber = 3;

            if (difficulty === 'facil') {
                levelInd.textContent = "Nivel: Fácil 🟢";
                basketCount = 2;
                maxNumber = 3;
            } else if (difficulty === 'medio') {
                levelInd.textContent = "Nivel: Medio 🟡";
                basketCount = 3;
                maxNumber = 5;
            } else {
                levelInd.textContent = "Nivel: Difícil 🔴";
                basketCount = 3;
                maxNumber = 10;
            }

            setupLevel(basketCount, maxNumber);
        }

        function setupLevel(basketCount, maxNumber) {
            const basketsContainer = document.getElementById('baskets-container');
            const applesSource = document.getElementById('apples-source');
            basketsContainer.innerHTML = '';
            applesSource.innerHTML = '';

            basketsData = [];
            let totalApplesRequired = 0;

            // Generate random distinct targets
            const usedTargets = new Set();
            for (let i = 0; i < basketCount; i++) {
                let target;
                do {
                    target = Math.floor(Math.random() * maxNumber) + 1;
                } while (usedTargets.has(target));
                usedTargets.add(target);
                totalApplesRequired += target;

                basketsData.push({
                    id: i,
                    target: target,
                    current: 0
                });
            }

            // Create baskets
            basketsData.forEach(basket => {
                const basketWrapper = document.createElement('div');
                basketWrapper.className = 'basket-wrapper';

                const basketEl = document.createElement('div');
                basketEl.className = 'basket';
                basketEl.id = `basket-${basket.id}`;
                basketEl.dataset.id = basket.id;

                // Drag & Drop event listeners
                basketEl.addEventListener('dragover', dragOver);
                basketEl.addEventListener('dragleave', dragLeave);
                basketEl.addEventListener('drop', dropToBasket);
                basketEl.addEventListener('click', () => {
                    speak(`Esta canasta necesita ${basket.target} manzanas. Tiene ${basket.current}`);
                });

                const targetEl = document.createElement('div');
                targetEl.className = 'basket-target';
                targetEl.textContent = basket.target;

                const applesInBasketEl = document.createElement('div');
                applesInBasketEl.className = 'apples-in-basket';
                applesInBasketEl.id = `apples-in-basket-${basket.id}`;

                basketEl.appendChild(targetEl);
                basketEl.appendChild(applesInBasketEl);
                basketWrapper.appendChild(basketEl);
                basketsContainer.appendChild(basketWrapper);
            });

            // Create apples to drag
            // Generate extra apples so kids can make mistakes and count
            const applesToGenerate = totalApplesRequired + 2; 
            for (let i = 0; i < applesToGenerate; i++) {
                const apple = document.createElement('div');
                apple.className = 'apple';
                apple.id = `apple-src-${i}`;
                apple.textContent = '🍎';
                apple.draggable = true;
                apple.addEventListener('dragstart', dragStart);
                apple.addEventListener('touchstart', touchStart, { passive: false });
                apple.addEventListener('touchmove', touchMove, { passive: false });
                apple.addEventListener('touchend', touchEnd);

                applesSource.appendChild(apple);
            }

            instructionText = `Coloca las manzanas correspondientes en cada canasta. ¡Vamos!`;
            speakInstruction();
        }

        // Drag & Drop API Logic
        let draggedApple = null;

        function dragStart(e) {
            draggedApple = this;
            e.dataTransfer.setData('text/plain', this.id);
            playSound('pop');
        }

        function dragOver(e) {
            e.preventDefault();
            this.classList.add('drag-over');
        }

        function dragLeave(e) {
            this.classList.remove('drag-over');
        }

        function dropToBasket(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            const basketId = parseInt(this.dataset.id);
            const basketObj = basketsData[basketId];

            if (draggedApple) {
                // If it is dragged from source or another basket
                moveAppleToBasket(draggedApple, basketId);
                draggedApple = null;
            }
        }

        function dropToSource(e) {
            e.preventDefault();
            if (draggedApple) {
                moveAppleToSource(draggedApple);
                draggedApple = null;
            }
        }

        // Handle Touch Events (Mobile/Tablet friendly drag & drop)
        let touchStartPos = { x: 0, y: 0 };
        let activeTouchApple = null;

        function touchStart(e) {
            activeTouchApple = this;
            const touch = e.touches[0];
            touchStartPos = { x: touch.clientX, y: touch.clientY };
            this.style.position = 'absolute';
            this.style.zIndex = 1000;
            playSound('pop');
        }

        function touchMove(e) {
            if (!activeTouchApple) return;
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartPos.x;
            const dy = touch.clientY - touchStartPos.y;
            activeTouchApple.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
        }

        function touchEnd(e) {
            if (!activeTouchApple) return;
            const apple = activeTouchApple;
            activeTouchApple = null;

            apple.style.display = 'none'; // Temporarily hide to find what's underneath
            const touch = e.changedTouches[0];
            const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
            apple.style.display = ''; // Restore display

            // Reset styles
            apple.style.position = '';
            apple.style.zIndex = '';
            apple.style.transform = '';

            let basketEl = null;
            if (elementUnder) {
                basketEl = elementUnder.closest('.basket');
            }

            if (basketEl) {
                const basketId = parseInt(basketEl.dataset.id);
                moveAppleToBasket(apple, basketId);
            } else {
                moveAppleToSource(apple);
            }
        }

        // Logic Helpers
        function moveAppleToBasket(appleEl, basketId) {
            const basketObj = basketsData[basketId];
            const previousBasketId = appleEl.dataset.inBasket;

            if (previousBasketId !== undefined && parseInt(previousBasketId) === basketId) {
                // Dropped back into the same basket
                return;
            }

            // Remove from previous basket if it was in one
            if (previousBasketId !== undefined) {
                const prevBasket = basketsData[parseInt(previousBasketId)];
                prevBasket.current--;
                updateBasketVisuals(parseInt(previousBasketId));
            }

            // Add to new basket
            basketObj.current++;
            appleEl.dataset.inBasket = basketId;

            // Update UI/Visual representation of apple inside basket
            const listContainer = document.getElementById(`apples-in-basket-${basketId}`);
            
            // Re-style apple for visual layout inside basket
            appleEl.className = 'basket-apple';
            appleEl.style.position = '';
            appleEl.style.transform = '';
            appleEl.draggable = true;

            // Make sure touch events still allow dragging out of the basket
            appleEl.removeEventListener('touchstart', touchStart);
            appleEl.removeEventListener('touchmove', touchMove);
            appleEl.removeEventListener('touchend', touchEnd);
            appleEl.addEventListener('touchstart', touchStart, { passive: false });
            appleEl.addEventListener('touchmove', touchMove, { passive: false });
            appleEl.addEventListener('touchend', touchEnd);

            listContainer.appendChild(appleEl);

            updateBasketVisuals(basketId);
        }

        function moveAppleToSource(appleEl) {
            const previousBasketId = appleEl.dataset.inBasket;
            if (previousBasketId !== undefined) {
                const prevBasket = basketsData[parseInt(previousBasketId)];
                prevBasket.current--;
                delete appleEl.dataset.inBasket;
                updateBasketVisuals(parseInt(previousBasketId));
            }

            appleEl.className = 'apple';
            appleEl.style.position = '';
            appleEl.style.transform = '';
            
            document.getElementById('apples-source').appendChild(appleEl);
            playSound('pop');
        }

        function clearBasketStatuses() {
            basketsData.forEach(basket => {
                const basketEl = document.getElementById(`basket-${basket.id}`);
                if (basketEl) {
                    basketEl.classList.remove('success', 'error');
                }
            });
        }

        function updateBasketVisuals(basketId) {
            // Clear visual statuses when user makes changes so they can verify again
            clearBasketStatuses();
        }

        function verifyLevel() {
            let allCorrect = true;

            basketsData.forEach(basket => {
                const basketEl = document.getElementById(`basket-${basket.id}`);
                if (basketEl) {
                    if (basket.current === basket.target) {
                        basketEl.classList.add('success');
                        basketEl.classList.remove('error');
                    } else {
                        basketEl.classList.add('error');
                        basketEl.classList.remove('success');
                        allCorrect = false;
                    }
                }
            });

            if (allCorrect) {
                playSound('success');
                speak("¡Excelente trabajo! Todas las canastas tienen las manzanas correctas.");
                setTimeout(() => {
                    playSound('victory');
                    showScreen('victory');
                }, 1500);
            } else {
                playSound('wrong');
                speak("¡Oh, no! Algunas canastas no tienen la cantidad correcta. ¡Revisa con cuidado!");
            }
        }

        // Confetti effect
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let confettiPieces = [];
        let animationFrame = null;

        function startConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            confettiPieces = [];
            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 360,
                    rotationSpeed: Math.random() * 4 - 2
                });
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            updateConfetti();
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            confettiPieces.forEach(p => {
                p.y += p.speed;
                p.angle += p.rotationSpeed;
                if (p.y < canvas.height) {
                    active = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
            });
            if (active) {
                animationFrame = requestAnimationFrame(updateConfetti);
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Initialize Speak instructions on load
        window.addEventListener('load', () => {
            instructionText = "Elige un nivel para jugar: Fácil, Medio, o Difícil";
            setTimeout(speakInstruction, 1000);
        });
    </script>
</body>
</html>
